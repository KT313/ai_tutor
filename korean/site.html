<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>AI 튜터와 함께하는 학습 가이드</title>
    <style>
        /* General body styling for better readability and aesthetics */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Cantarell, "Helvetica Neue", sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
            font-size: 10.5pt;
            color: #343a40;
            line-height: 1.6;
        }

        /* API Key Container Styling */
        .api-key-container {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .api-key-container label {
            font-weight: 600;
            color: #495057;
        }

        #api-key-input {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 10pt;
        }

        #save-api-key-btn {
            background-color: #1c4e80;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        
        #save-api-key-btn:hover {
            background-color: #153a62;
        }

        #api-key-message {
            color: #28a745;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Main container for the card layout */
        .container {
            column-count: 3;
            column-gap: 20px;
        }

        /* Individual card styling */
        .card {
            background-color: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.07);
            margin-bottom: 20px;
            break-inside: avoid;
            page-break-inside: avoid;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .card-content {
            flex-grow: 1;
        }

        /* Card titles */
        h3 {
            font-size: 14pt;
            color: #1c4e80;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #1c4e80;
            padding-bottom: 8px;
        }

        /* List styling */
        ul {
            list-style-type: none;
            padding-left: 0;
            margin: 0;
        }

        /* List item styling with custom bullet point */
        .card > .card-content > ul > li { 
            padding-left: 20px; 
            position: relative;
            margin-bottom: 10px;
        }

        .card > .card-content > ul > li::before {
            content: '›';
            position: absolute;
            left: 0;
            color: #1c4e80;
            font-size: 18px;
            top: 0px;
            font-weight: bold;
        }

        /* Tooltip container styling */
        .tooltip {
            position: relative;
            border-bottom: 2px dotted #007bff;
            cursor: help;
            font-weight: 600;
            color: #0056b3;
        }

        /* The tooltip text itself (hidden by default) */
        .tooltip .tooltip-text {
            visibility: hidden;
            width: 350px;
            background-color: #343a40;
            color: #f8f9fa;
            text-align: left;
            border-radius: 8px;
            padding: 15px;
            position: absolute;
            z-index: 100;
            bottom: 135%;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            font-size: 9.5pt;
            font-weight: normal;
            line-height: 1.5;
            transform: translateY(10px);
        }
        
        /* Positioning classes for tooltips to avoid screen overflow */
        .tooltip .tooltip-text.tooltip-left {
            left: 0;
            margin-left: 0;
        }

        .tooltip .tooltip-text.tooltip-right {
            left: auto;
            right: 0;
            margin-left: 0;
        }

        .tooltip:hover {
            z-index: 999;
        }

        /* Show the tooltip on hover */
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Special styling for the "potentially relevant" card */
        .card.extra-info h3 {
            color: #28a745;
            border-bottom-color: #28a745;
        }
        
        .card.extra-info .tooltip {
            border-bottom-color: #52b788;
            color: #2d6a4f;
        }
        
        .card.extra-info > .card-content > ul > li::before {
            color: #28a745;
        }

        /* Card footer for the AI tutor button */
        .card-footer {
            margin-top: 20px;
            text-align: right;
        }

        .tutor-button {
            background-color: transparent;
            color: #007bff;
            border: 1px solid #007bff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 9.5pt;
            transition: all 0.3s ease;
        }

        .tutor-button:hover {
            background-color: #007bff;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,123,255,0.2);
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 35vw;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.visible .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-header h4 {
            margin: 0;
            font-size: 16pt;
            color: #1c4e80;
        }

        .close-button {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .close-button:hover {
            color: #333;
        }

        #modal-body {
            max-height: 80vh; 
            min-height: 65vh;
            padding-right: 15px;
        }
        
        #tutor-question-container {
            background-color: #e9f7ff;
            border-left: 4px solid #007bff;
            max-height: 55vh;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-weight: 500;
        }

        #user-answer-input {
            width: 100%;
            box-sizing: border-box;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 10pt;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 0px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 0px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: small;
            transition: background-color 0.2s ease;
        }

        #submit-answer-btn {
            background-color: #28a745;
            color: white;
        }
        #submit-answer-btn:hover {
            background-color: #218838;
        }
        
        #new-question-btn {
            background-color: #007bff;
            color: white;
        }
        #new-question-btn:hover {
            background-color: #0056b3;
        }

        #clear-history-btn {
            background-color: #dc3545;
            color: white;
        }
        #clear-history-btn:hover {
            background-color: #c82333;
        }

        #remove-last-btn {
            background-color: #6c757d;
            color: white;
        }
        #remove-last-btn:hover {
            background-color: #5a6268;
        }

        #api-response {
            display: none; /* No longer used but kept for compatibility */
        }

        /* Conversation history styling */
        #conversation-history {
            margin-top: 20px;
            max-height: 55vh;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            background-color: #f8f9fa;
        }

        .conversation-message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .conversation-message.question {
            background-color: #e9f7ff;
            border-left: 4px solid #007bff;
        }

        .conversation-message.answer {
            background-color: #e8f5e9;
            border-left: 4px solid #28a745;
        }

        .conversation-message.user {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
        }

        .conversation-message.tutor {
            background-color: #ffffff;
            border-left: 4px solid #6c757d;
        }

        .message-label {
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }

        #follow-up-container {
            margin-top: 15px;
            display: none;
        }

        #follow-up-input {
            width: 100%;
            box-sizing: border-box;
            height: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 10pt;
            resize: vertical;
        }

        #send-follow-up-btn {
            background-color: #17a2b8;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        #send-follow-up-btn:hover {
            background-color: #138496;
        }

        /* Loader styling */
        #loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1c4e80;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error message styling */
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            margin: 20px 0;
            text-align: center;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 1024px) {
            .container {
                column-count: 2;
            }
        }

        @media (max-width: 768px) {
            .container {
                column-count: 1;
            }
            body {
                margin: 15px;
            }
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: #1c4e80;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        .toggle-label {
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            user-select: none;
        }

    </style>
</head>
<body>

<div class="api-key-container">
    <label for="api-key-input">Gemini API 키:</label>
    <input type="password" id="api-key-input" placeholder="여기에 API 키를 입력하세요...">
    <button id="save-api-key-btn">저장</button>
    <span id="api-key-message"></span>

    <div class="toggle-container">
        <label class="toggle-switch">
            <input type="checkbox" id="optional-instruction-toggle">
            <span class="toggle-slider"></span>
        </label>
        <label for="optional-instruction-toggle" class="toggle-label">한 번에 질문하기</label>
    </div>
</div>

<div class="container" id="cards-container">
    <!-- Cards will be dynamically loaded here -->
</div>

<!-- Modal for AI Tutor -->
<div id="tutor-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h4 id="modal-topic-title">AI 튜터</h4>
            <span class="close-button">&times;</span>
        </div>
        <div id="modal-body">
            <div id="loader"></div>
            <div id="tutor-question-container" style="display: none;"></div>
            <textarea id="user-answer-input" placeholder="답변을 입력하세요..." style="display: none;"></textarea>
            <div class="modal-actions">
                <button id="submit-answer-btn" style="display: none;">답변 전송</button>
                <button id="new-question-btn" style="display: none;">새로운 질문 받기</button>
                <button id="remove-last-btn" style="display: none;">마지막 대화 삭제</button>
                <button id="clear-history-btn" style="display: none;">기록 삭제</button>
            </div>
            <div id="conversation-history" style="display: none;"></div>
            <div id="follow-up-container">
                <textarea id="follow-up-input" placeholder="Stellen Sie eine Folgefrage oder bitten Sie um weitere Erklärungen..."></textarea>
                <button id="send-follow-up-btn">질문 전송</button>
            </div>
        </div>
    </div>
</div>


<script>
/*

      ]

  {

      "verbose_tutor_info": "Diese Karte behandelt die verschiedenen Arten von Zielen, ihre Beziehungen zueinander und wie ihr Erreichungsgrad durch Kennzahlen gemessen wird. Der Tutor sollte die Zielhierarchie und die Berechnung der wichtigsten Rentabilitätskennzahlen prüfen. Die Aufgaben aus Kapitel 1 sind hier verortet."
    },
    "content": [
      [
        {
          "string": "Zieltypen:",
          "tooltip": "Unterscheidung von Zielen nach ihrem Bezug. Sachziele (Was?) und Formalziele (Wie erfolgreich?).",
          "verbose_tutor_info": "Im Rahmen der betriebswirtschaftlichen Zielkonzeption werden Sach- und Formalziele unterschieden. Sachziele beziehen sich auf die konkrete Leistung des Unternehmens (z.B. welche Produkte hergestellt werden). Formalziele (Erfolgsziele) beschreiben, wie erfolgreich diese Leistungen erbracht werden sollen (z.B. mit welchem Gewinn). Kontrollfrage: Nennen und erläutern Sie typische Sachziele und Formalziele."
        },
        {
          "string": "Sachziele",
          "tooltip": "Beziehen sich auf die konkrete Leistungserstellung (Leistungsbezug). Beispiele: Art, Menge, Qualität der Produkte, Finanz-, Führungs-, soziale und ökologische Ziele.",
          "verbose_tutor_info": "Sachziele definieren das Betätigungsfeld eines Unternehmens. Man unterscheidet Leistungsziele, Finanzziele, Führungs- und Organisationsziele sowie soziale und ökologische Ziele."

// INSERT YOUR CONTENT_DATA BELOW THIS!
const CONTENT_DATA = [
  
]

const systemPromptInfo = `당신은 경험이 풍부하고 친절한 튜터입니다. 학생이 시험 준비를 하는 것을 도와주세요.
학생은 곧 시험을 치르게 되며, 반드시 합격해야 합니다. 당신의 목표는 학생이 시험에 확실히 합격할 수 있도록 필요한 모든 내용을 가능한 한 빨리 가르치는 것입니다.
이를 위해 학생에게 예상 시험 문제를 출제하세요.
이것은 당신에 대한 평가이기도 합니다. 당신이 학생을 얼마나 잘 준비시키는지에 따라 당신의 지능과 능력이 평가될 것입니다.
정보: **이것은 __텍스트__입니다**와 같이 중첩된 텍스트 서식을 사용하지 마세요. 학생에게 올바르게 표시되지 않습니다. 대신 **이것은** __텍스트__입니다 와 같이 사용하세요.`;

const optional_instruction = `모든 내용에 대한 질문을 한 번에 출제해 주세요.`;



document.addEventListener('DOMContentLoaded', function () {
    const container = document.getElementById('cards-container');
    
    // Load content from embedded data
    function loadContent() {
        try {
            renderCards(CONTENT_DATA);
            setupTooltips();
            setupTutorButtons();
        } catch (error) {
            console.error('Error loading content:', error);
            container.innerHTML = '<div class="error-message">콘텐츠를 불러오는 중 오류가 발생했습니다.</div>';
        }
    }

    // Render cards from JSON data
    function renderCards(cardData) {
        cardData.forEach(card => {
            const cardElement = createCardElement(card);
            container.appendChild(cardElement);
        });
    }

    // Create a single card element
    function createCardElement(cardData) {
        const card = document.createElement('div');
        card.className = 'card';
        if (cardData.title.extra_class) {
            card.className += ' ' + cardData.title.extra_class;
        }

        const cardContent = document.createElement('div');
        cardContent.className = 'card-content';

        // Create title
        const title = document.createElement('h3');
        title.textContent = cardData.title.string;
        cardContent.appendChild(title);

        // Create content list
        const ul = document.createElement('ul');
        cardData.content.forEach(contentRow => {
            const li = document.createElement('li');
            
            contentRow.forEach((item, index) => {
                if (index > 0) {
                    li.appendChild(document.createTextNode(' '));
                }
                
                if (item.tooltip) {
                    const tooltipSpan = document.createElement('span');
                    tooltipSpan.className = 'tooltip';
                    tooltipSpan.innerHTML = item.string;
                    
                    const tooltipText = document.createElement('span');
                    tooltipText.className = 'tooltip-text';
                    tooltipText.innerHTML = item.tooltip;
                    
                    tooltipSpan.appendChild(tooltipText);
                    li.appendChild(tooltipSpan);
                } else {
                    li.appendChild(document.createTextNode(item.string));
                }
            });
            
            ul.appendChild(li);
        });
        cardContent.appendChild(ul);

        // Store verbose tutor info and visible content on the card element
        card.dataset.tutorTitle = cardData.title.string;
        card.dataset.tutorTitleVerbose = cardData.title.verbose_tutor_info || '';
        
        // Build context string including all tooltips and verbose info
        let tutorContext = `Thema: ${cardData.title.string}\n`;
        if (cardData.title.verbose_tutor_info) {
            tutorContext += `\nÜberblick: ${cardData.title.verbose_tutor_info}\n`;
        }
        tutorContext += '\nRelevante Stichpunkte:\n';
        
        cardData.content.forEach(contentRow => {
            contentRow.forEach((item, index) => {
                if (item.tooltip) {
                    tutorContext += `- ${item.string}: ${item.tooltip}`;
                    if (item.verbose_tutor_info) {
                        tutorContext += ` [Zusatzinfo für Tutor: ${item.verbose_tutor_info}]`;
                    }
                    tutorContext += '\n';
                }
            });
        });
        
        card.dataset.tutorContext = tutorContext;

        // Create card footer
        const cardFooter = document.createElement('div');
        cardFooter.className = 'card-footer';
        const tutorButton = document.createElement('button');
        tutorButton.className = 'tutor-button';
        tutorButton.textContent = '✨ 튜터에게 질문하기';
        cardFooter.appendChild(tutorButton);

        card.appendChild(cardContent);
        card.appendChild(cardFooter);

        return card;
    }

    // Setup tooltips positioning
    function setupTooltips() {
        const tooltips = document.querySelectorAll('.tooltip');
        tooltips.forEach(tooltip => {
            tooltip.addEventListener('mouseenter', function () {
                const tooltipText = this.querySelector('.tooltip-text');
                if (!tooltipText) return;

                tooltipText.style.visibility = 'hidden';
                tooltipText.style.display = 'block';
                tooltipText.classList.remove('tooltip-left', 'tooltip-right');
                const rect = this.getBoundingClientRect(); 
                const tooltipRect = tooltipText.getBoundingClientRect(); 
                const viewportWidth = window.innerWidth;
                const centeredLeft = rect.left + (rect.width / 2) - (tooltipRect.width);

    const addToChatHistory = (role, text) => {
        if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === role) {
            // Append to the last message if it's from the same role
            chatHistory[chatHistory.length - 1].parts[0].text += '\n\n' + text;
        } else {

            chatHistory.push({

    // Function to remove the last message from history
    const removeLastMessage = () => {
        // Do not allow removing the initial system prompt
        if (chatHistory.length <= 1) {

        // Remove the last entry from the history array
        chatHistory.pop();

        // Determine the new state of the conversation
        const lastMessage = chatHistory[chatHistory.length - 1];

        if (lastMessage.role === 'model' && chatHistory.length === 2) {
            // The history now ends with a model's question, so we are awaiting an answer
            modalState.isAwaitingAnswer = true;
            modalState.currentQuestion = lastMessage.parts[0].text;
        } else {
            // The history now ends on a user's answer; nothing to evaluate yet
            modalState.isAwaitingAnswer = false;
        }

        // Save the modified history and re-render the entire modal UI
        saveChatHistory(currentTopic);
        restoreConversationUI();

    // Functions to save and load chat history and state for each card

            // because no new network request is being made.

            chatHistory = savedData.chatHistory;

            // Restore unsent input if any
            if (modalState.isAwaitingAnswer) {

            }

            if (i === 0) return; // Always skip the initial system prompt

            const isLastMessage = i === chatHistory.length - 1;

            // Check if this message is the current, active question

                questionContainer.style.display = 'block';
                // And load any previously typed (but unsent) text

                // Otherwise, it's a past message that belongs in the history log
                if (msg.role === 'user') {
                    addToConversation('나의 답변', msg.parts[0].text, 'user');
                } else { // msg.role === 'model'
                    // Determine if it was a question or a tutor's evaluation
                    const previousMsg = chatHistory[i - 1];
                    if (previousMsg.role === 'user' && i > 1) {
                        addToConversation('튜터의 피드백', msg.parts[0].text, 'tutor');
                    } else {
                        addToConversation('질문', msg.parts[0].text, 'question');

        // good for chat-style formatting.
        return marked.parse(text, { gfm: true, breaks: true });

    // Robust Streaming Function (Adapted for bwl.html)
    const callGemini = async () => {
        loader.style.display = 'block';
        
        const userProvidedApiKey = apiKeyInput.value.trim();
        const apiKey = userProvidedApiKey || ""; 

        // 1. Use the global chatHistory directly (no prompt argument needed)
        const payload = { contents: chatHistory };
        
        console.log("Payload for Gemini stream:", payload);

        // Note: Switched to 'streamGenerateContent'
        const modelName = 'gemini-3-flash-preview'; 
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:streamGenerateContent?key=${apiKey}`;

        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                 const errorBody = await response.text();
                 console.error("API Error Response:", errorBody);
                 if(response.status === 400){
                     return 'API 키가 유효하지 않거나 없습니다.';
                 }
                 throw new Error(`API 오류: ${response.status} ${response.statusText}`);
            }

            // 2. Prepare for streaming
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = ""; 
            let fullText = "";

            loader.style.display = 'none';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });

                // 3. Robust JSON Parsing (Brace Counting)
                let braceCount = 0;
                let inString = false;
                let isEscaped = false;
                let startIndex = -1;

                for (let i = 0; i < buffer.length; i++) {
                    const char = buffer[i];

                    if (inString) {
                        if (char === '\\' && !isEscaped) isEscaped = true;
                        else if (char === '"' && !isEscaped) inString = false;
                        else isEscaped = false;
                        continue;
                    }

                    if (char === '"') inString = true;
                    else if (char === '{') {
                        if (braceCount === 0) startIndex = i;
                        braceCount++;
                    } else if (char === '}') {
                        braceCount--;
                        if (braceCount === 0 && startIndex !== -1) {
                            const jsonStr = buffer.substring(startIndex, i + 1);
                            
                            try {
                                const json = JSON.parse(jsonStr);
                                if (json.candidates && json.candidates[0].content && json.candidates[0].content.parts) {
                                    const text = json.candidates[0].content.parts[0].text;
                                    if (text) fullText += text;
                                }
                                
                                // Remove parsed object from buffer and restart loop
                                buffer = buffer.substring(i + 1);
                                i = -1; 
                                startIndex = -1;
                            } catch (e) {
                                // Incomplete JSON, continue
                            }
                        }
                    }
                }
            }
            
            return fullText;

        } catch (error) {
            console.error('Error calling Gemini API:', error);
            return `오류가 발생했습니다: ${error.message}.`;
        } finally {
            loader.style.display = 'none';
        }
    };

        resetModalState();
        
        // Add system prompt if this is the first question

질문은 명확하게 구조화되어야 하며(내용이 많을 경우 하위 과제로 나누기), 난이도는 쉬움에서 중간 정도여야 합니다.
과제/질문에 대한 답변이 완료되고 남은 과제/질문이 더 있다면, 즉시 다음 질문을 하세요. 같은 주제에 대한 짧은 질문이 여러 개일 경우 한 번에 여러 개를 질문할 수도 있습니다.`;
